{% extends "base.html" %}
{% block title %}Modifier élève{% endblock %}
{% block page_title %}Modifier élève{% endblock %}
{% block breadcrumb %}<a href="/eleve/">Liste des élèves</a> / Modifier{% endblock %}

{% block content %}
<form method="post">
    <label for="nom">Nom</label>
    <input type="text" id="nom" name="nom" value="{{ eleve.nom }}" required>

    <label for="age">Age</label>
    <input type="number" id="age" name="age" value="{{ eleve.age }}" required>

    <label for="email">Email</label>
    <input type="email" id="email" name="email" value="{{ eleve.email }}" required>

    <label for="promotion_id">ID Promotion</label>
    <input type="number" id="promotion_id" name="promotion_id" value="{{ eleve.promotion_id }}" required>

    <button type="submit">Modifier</button>
</form>
{% endblock %}
