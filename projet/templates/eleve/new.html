{% extends "base.html" %}
{% block title %}Ajouter un élève{% endblock %}
{% block page_title %}Ajouter un nouvel élève{% endblock %}
{% block breadcrumb %}<a href="/eleve/">Élèves</a> / Ajouter{% endblock %}

{% block content %}
<form method="post" action="/eleve/new">
    <label for="nom">Nom</label>
    <input type="text" id="nom" name="nom" required>

    <label for="age">Age</label>
    <input type="number" id="age" name="age" required>

    <label for="email">Email</label>
    <input type="email" id="email" name="email" required>

    <label for="promotion_id">ID Promotion</label>
    <input type="number" id="promotion_id" name="promotion_id" required>

    <button type="submit">Ajouter</button>
</form>
{% endblock %}
