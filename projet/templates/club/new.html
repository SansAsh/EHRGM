{% extends "base.html" %}

{% block title %}Ajouter un club{% endblock %}
{% block page_title %}Ajouter un nouveau club{% endblock %}
{% block breadcrumb %}<a href="/club/">Liste des clubs</a> / Ajouter{% endblock %}

{% block content %}

<form method="post" action="/club/new">
    <label for="nom">Nom du club</label>
    <input type="text" id="nom" name="nom" required>

    <label for="sport_id">Sport</label>
    <select id="sport_id" name="sport_id" required>
        {% for sport in sports %}
            <option value="{{ sport.id }}">{{ sport.nom }}</option>
        {% endfor %}
    </select>

    <button type="submit">Ajouter</button>
</form>

{% endblock %}
