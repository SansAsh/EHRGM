{% extends "base.html" %}

{% block title %}Ajouter une note{% endblock %}
{% block page_title %}Ajouter une nouvelle note{% endblock %}
{% block breadcrumb %}<a href="/note/">Liste des Notes</a> / Ajouter{% endblock %}

{% block content %}
<form method="post" action="/note/new">

    <label>ID Élève</label>
    <input type="number" name="eleve_id" required>

    <label>ID Prof</label>
    <input type="number" name="prof_id" required>

    <label>Cours</label>
    <select name="cours_id" required>
        {% for c in cours %}
            <option value="{{ c.id }}">{{ c.nom }}</option>
        {% endfor %}
    </select>

    <label>Note</label>
    <input type="number" step="0.01" name="note_valeur" required>

    <button type="submit">Ajouter</button>
</form>
{% endblock %}
