<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Dashboard{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="container">

    <aside class="sidebar">
        <h2>Dashboard</h2>
        <button class="sidebar-btn" onclick="location.href='/'">Accueil</button>
        <button class="sidebar-btn" onclick="location.href='/eleve/'">Liste des élèves</button>
        <button class="sidebar-btn" onclick="location.href='/specialite/'">Spécialités</button>
        <button class="sidebar-btn" onclick="location.href='/prof/'">Liste des profs</button>
        <button class="sidebar-btn" onclick="location.href='/note/'">Note</button>
        <button class="sidebar-btn" onclick="location.href='/club/'">Club</button>
    </aside>
    
    <!-- Main Content -->
    <main class="main-content">
        <div class="topbar">
            <h1>{% block page_title %}Page{% endblock %}</h1>
            <div class="breadcrumb">{% block breadcrumb %}Accueil{% endblock %}</div>
        </div>

        <!-- Page content -->
        {% block content %}{% endblock %}
    </main>
</div>
</body>
</html>
