<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion École - FastAPI</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header>
        <h1>🎓 Gestion des Élèves</h1>
    </header>

    <main>
        <!-- Section Ajouter un élève -->
        <section class="card">
            <h2>Ajouter un élève</h2>
            <div class="form-group">
                <input type="text" id="nom" placeholder="Nom">
                <input type="email" id="email" placeholder="Email">
                <input type="number" id="age" placeholder="Age">
                <input type="number" id="promo" placeholder="ID Promotion">
                <button id="btn-ajouter">Ajouter</button>
            </div>
            <p id="message"></p>
        </section>

        <!-- Section Liste des élèves -->
        <section class="card">
            <h2>Liste des élèves</h2>
            <button id="btn-liste" class="btn-primary">Afficher tous les élèves</button>
            <ul id="liste-eleves"></ul>
        </section>

        <!-- Section Bonnes notes -->
        <section class="card">
            <h2>Élèves avec bonnes notes</h2>
            <button id="btn-bonne-notes" class="btn-primary">Afficher bonnes notes</button>
            <ul id="liste-bonnes-notes"></ul>
        </section>
    </main>

    <footer>
        <p>© 2026 Projet FastAPI - Dylan Guichard</p>
    </footer>

    <script src="/static/js/index.js"></script>
</body>
</html>
